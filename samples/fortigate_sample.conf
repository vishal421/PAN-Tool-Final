config firewall address
    edit "Server01"
        set subnet 10.10.10.10 255.255.255.255
        set comment "Primary web server"
    next
    edit "Server02"
        set subnet 10.10.10.20 255.255.255.255
    next
    edit "InternalNet"
        set subnet 192.168.1.0 255.255.255.0
    next
    edit "PublicDNS"
        set type fqdn
        set fqdn "dns.example.com"
    next
    edit "DHCPRange1"
        set type iprange
        set start-ip 10.20.0.10
        set end-ip 10.20.0.50
    next
end

config firewall addrgrp
    edit "WebServers"
        set member "Server01" "Server02"
        set comment "All web tier hosts"
    next
end

config firewall service custom
    edit "HTTPS_8443"
        set tcp-portrange 8443
        set comment "Custom HTTPS port"
    next
    edit "DNS_UDP"
        set udp-portrange 53
    next
    edit "PING"
        set protocol ICMP
        set icmptype 8
    next
end

config firewall service group
    edit "WebServices"
        set member "HTTPS_8443" "DNS_UDP"
    next
end

config system zone
    edit "LAN"
        set interface "port1"
    next
    edit "WAN"
        set interface "port2"
    next
end

config system interface
    edit "port1"
        set vdom "root"
        set ip 192.168.1.1 255.255.255.0
        set description "Internal LAN"
        set mtu 1500
    next
    edit "port2"
        set vdom "root"
        set ip 203.0.113.1 255.255.255.0
        set description "ISP Uplink"
        set mtu 1500
    next
end

config router static
    edit "1"
        set dst 0.0.0.0 0.0.0.0
        set gateway 203.0.113.254
        set device "port2"
    next
end

config firewall vip
    edit "DMZ_WebServer_VIP"
        set extip 203.0.113.50
        set mappedip "10.10.10.10"
        set extintf "port2"
    next
end

config firewall policy
    edit "1"
        set name "Allow_LAN_to_WebServers"
        set srcintf "port1"
        set dstintf "port2"
        set srcaddr "InternalNet"
        set dstaddr "WebServers"
        set action accept
        set service "WebServices"
        set logtraffic all
        set comments "LAN users to published web servers"
        set status enable
        set nat enable
    next
    edit "2"
        set name "Deny_All_Else"
        set srcintf "any"
        set dstintf "any"
        set srcaddr "all"
        set dstaddr "all"
        set action deny
        set service "ALL"
        set logtraffic disable
        set status enable
    next
end
