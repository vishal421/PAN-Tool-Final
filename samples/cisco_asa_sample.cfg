! Sample Cisco ASA configuration for converter testing
object network SERVER01
 host 10.10.10.10
 description Primary web server
 nat (inside,outside) static 203.0.113.10
object network SERVER02
 host 10.10.10.20
object network INTERNAL_NET
 subnet 192.168.1.0 255.255.255.0
object network DHCP_RANGE
 range 10.20.0.10 10.20.0.50
object network PUBLIC_DNS
 fqdn v4 dns.example.com
!
nat (inside,outside) source dynamic INTERNAL_NET interface
!
object-group network WEB_SERVERS
 network-object object SERVER01
 network-object object SERVER02
!
object service HTTPS_8443
 service tcp destination eq 8443
object service DNS_UDP
 service udp destination eq 53
!
object-group service WEB_SERVICES tcp
 port-object eq 8443
 port-object eq 80
!
interface GigabitEthernet0/0
 nameif inside
 security-level 100
 ip address 192.168.1.1 255.255.255.0
 description Internal LAN
interface GigabitEthernet0/1
 nameif outside
 security-level 0
 ip address 203.0.113.1 255.255.255.0
 description ISP Uplink
!
mtu inside 1500
mtu outside 1500
!
route outside 0.0.0.0 0.0.0.0 203.0.113.254 1
!
access-list OUTSIDE_IN extended permit tcp any object SERVER01 eq 8443
access-list OUTSIDE_IN extended permit udp any object SERVER01 eq 53
access-list OUTSIDE_IN extended deny ip any any
!
access-group OUTSIDE_IN in interface outside
